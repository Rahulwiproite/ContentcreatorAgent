services:
  backend:
    build:
      context: ./backend
    image: contentcreator-agent-backend:latest
    container_name: cca-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:////data/agent.db
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    image: contentcreator-agent-frontend:latest
    container_name: cca-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  backend_data:
